<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>NEURAL INTERFACE v14.7 - TACTICAL SCANNER</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        :root { --neon: #32ff7e; --alert: #ff3e3e; --glass: rgba(0, 255, 126, 0.1); --panel-bg: rgba(0, 10, 0, 0.95); }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Courier New', monospace; color: var(--neon); }
        
        /* Сетка и эффекты */
        .overlay-fx { position: absolute; inset: 0; pointer-events: none; z-index: 150; background: repeating-linear-gradient(0deg, rgba(255, 255, 255, 0.005) 0px, transparent 1px); background-size: 100% 4px; }
        .overlay-fx::after { content: ''; position: absolute; inset: 0; background: radial-gradient(circle at center, transparent 40%, rgba(0,0,0,0.4) 100%); }

        /* Эффект сетки непосредственно на карте */
        .map-grid-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 5;
            background-image: 
                linear-gradient(to right, rgba(50, 255, 126, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(50, 255, 126, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.5;
        }

        /* Карта */
        .map-wrapper { position: absolute; inset: 0; transition: filter 0.4s; }
        .map-layer { position: absolute; inset: 0; }
        #map-top { z-index: 2; -webkit-mask-image: radial-gradient(circle, black 120px, transparent 200px); mask-image: radial-gradient(circle, black 120px, transparent 200px); pointer-events: none; opacity: 1; transition: opacity 0.3s; }
        #map-bottom { z-index: 1; filter: brightness(0.25) grayscale(1); transition: opacity 0.5s ease-in-out, filter 0.5s ease; }
        
        /* Эффект при смене подложки */
        .glitch-flash {
            animation: flash-anim 0.4s ease-out forwards;
        }
        @keyframes flash-anim {
            0% { opacity: 1; filter: brightness(5) white-balance(100%); }
            100% { opacity: 0; filter: brightness(1); }
        }
        #transition-overlay {
            position: absolute;
            inset: 0;
            background: var(--neon);
            z-index: 100;
            pointer-events: none;
            opacity: 0;
        }

        /* HUD */
        .hud { position: absolute; inset: 0; z-index: 200; pointer-events: none; padding: 0; display: flex; flex-direction: column; justify-content: space-between; }
        
        /* ВЕРХНЯЯ ПЛАШКА */
        .top-header-panel { 
            width: 100%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: rgba(0, 0, 0, 0.5); 
            backdrop-filter: blur(10px); 
            border-bottom: 1px solid var(--glass); 
            padding: 10px 20px;
            box-sizing: border-box;
            pointer-events: auto;
        }

        .telemetry-box { font-size: 10px; line-height: 1.6; border-left: 2px solid var(--neon); padding-left: 12px; min-width: 220px; }
        .telemetry-box b { color: #fff; letter-spacing: 1px; }

        /* Бегущая строка */
        .weather-ticker {
            width: 100%;
            background: transparent;
            border-bottom: 1px solid var(--glass);
            overflow: hidden;
            white-space: nowrap;
            padding: 4px 0;
            font-size: 9px;
            letter-spacing: 1px;
            pointer-events: auto;
        }
        .ticker-content {
            display: inline-block;
            padding-left: 100%;
            animation: ticker 40s linear infinite;
        }
        @keyframes ticker {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-100%, 0, 0); }
        }
        
        /* Пульсирующая точка */
        .stat-indicator { display: inline-block; width: 8px; height: 8px; background: var(--neon); border-radius: 50%; margin-right: 6px; box-shadow: 0 0 8px var(--neon); animation: pulse-dot 1s infinite; vertical-align: middle; }
        @keyframes pulse-dot { 0% { transform: scale(0.9); opacity: 0.7; } 50% { transform: scale(1.2); opacity: 1; } 100% { transform: scale(0.9); opacity: 0.7; } }
        .stat-active { color: var(--neon) !important; text-transform: uppercase; }

        .minimap-container { width: 200px; height: 80px; background: #000; position: relative; overflow: hidden; border: 1px solid rgba(50, 255, 126, 0.2); }
        #minimap { width: 100%; height: 100%; filter: saturate(0.5) brightness(0.8); }
        
        .user-dot-container { width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; }
        .user-dir { width: 0; height: 0; border-left: 6px solid transparent; border-right: 6px solid transparent; border-bottom: 12px solid var(--neon); filter: drop-shadow(0 0 5px var(--neon)); }

        .crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 300px; height: 300px; border: 1px solid rgba(50, 255, 126, 0.1); border-radius: 50%; opacity: 1; transition: 0.3s; }
        .target-data { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 11px; letter-spacing: 3px; font-weight: bold; text-align: center; pointer-events: none; }
        .target-data.locked { color: var(--alert); text-shadow: 0 0 10px var(--alert); animation: blink 0.2s infinite alternate; }
        @keyframes blink { from { opacity: 1; } to { opacity: 0.5; } }
        .searching-anim { animation: pulse-text 1.5s infinite; }
        @keyframes pulse-text { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* Контроллеры */
        .controls { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; padding: 10px 25px; background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(10px); border: 1px solid var(--glass); border-radius: 2px; pointer-events: auto; z-index: 300; }
        .icon-btn { background: none; border: none; color: var(--neon); cursor: pointer; width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; transition: 0.2s; opacity: 0.6; }
        .icon-btn:hover, .icon-btn.active { opacity: 1; filter: drop-shadow(0 0 8px var(--neon)); }
        .icon-btn svg { width: 26px; height: 26px; fill: currentColor; }

        /* Чат */
        #chat-panel { position: absolute; right: -320px; top: 0; bottom: 0; width: 300px; background: var(--panel-bg); backdrop-filter: blur(20px); border-left: 1px solid var(--neon); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 400; pointer-events: auto; display: flex; flex-direction: column; }
        #chat-panel.open { right: 0; }
        .chat-header { padding: 25px 15px 10px; font-size: 10px; border-bottom: 1px solid rgba(50, 255, 126, 0.1); display: flex; justify-content: space-between; letter-spacing: 1px; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 15px; font-size: 11px; display: flex; flex-direction: column; gap: 15px; }
        .msg { border-left: 1px solid var(--neon); padding-left: 10px; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .msg b { color: #fff; display: block; margin-bottom: 4px; font-size: 9px; opacity: 0.6; }
        .msg.bot { border-left-color: var(--alert); }
        
        .quick-replies { display: flex; flex-wrap: wrap; gap: 6px; padding: 12px; background: rgba(0,0,0,0.3); }
        .qr-btn { background: transparent; border: 1px solid var(--neon); color: var(--neon); font-size: 9px; padding: 5px 10px; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        .qr-btn:hover { background: var(--neon); color: #000; }

        .chat-input-area { padding: 15px; border-top: 1px solid rgba(50, 255, 126, 0.1); display: flex; gap: 8px; background: #000; }
        .chat-input-area input { background: transparent; border: 1px solid var(--neon); color: var(--neon); padding: 12px; flex: 1; font-family: monospace; font-size: 12px; outline: none; }

        /* Маркеры */
        .custom-poi { width: 14px; height: 14px; background: var(--neon); border: 2px solid #000; transform: rotate(45deg); box-shadow: 0 0 15px var(--neon); border-radius: 2px; cursor: pointer; pointer-events: auto; }
        .maplibregl-popup { z-index: 500; }
        .marker-form { background: #000; border: 1px solid var(--neon); padding: 15px; color: var(--neon); min-width: 180px; box-shadow: 0 0 20px rgba(0,0,0,0.8); }
        .marker-form input, .marker-form textarea { background: #111; border: 1px solid #333; color: #fff; width: 100%; margin: 8px 0; padding: 8px; font-size: 11px; outline: none; box-sizing: border-box; font-family: monospace; }
        .marker-form textarea { height: 50px; resize: none; }
        .marker-form button { background: var(--neon); border: none; color: #000; width: 100%; padding: 10px; cursor: pointer; font-weight: bold; letter-spacing: 1px; }

        /* Тулбар информации POI */
        .poi-info-panel { background: #000; border: 1px solid var(--neon); padding: 10px; color: var(--neon); font-size: 10px; min-width: 150px; text-transform: uppercase; }
        .poi-info-panel b { color: #fff; display: block; margin-bottom: 5px; border-bottom: 1px solid var(--glass); }
    </style>
</head>
<body>

<div class="overlay-fx"></div>
<div id="transition-overlay"></div>

<div id="chat-panel">
    <div class="chat-header">
        <span>LINK_SECURE: <span style="color:#fff">Центр-9</span></span>
        <div style="cursor:pointer" onclick="toggleChat()">[СВЕРНУТЬ]</div>
    </div>
    <div class="chat-messages" id="chat-msgs">
        <div class="msg bot"><b>ЦЕНТР</b> Канал синхронизирован. Ожидаю рапорт из сектора.</div>
    </div>
    
    <div class="quick-replies">
        <button class="qr-btn" onclick="quickSend('Статус сектора')">Статус</button>
        <button class="qr-btn" onclick="quickSend('Цель в прицеле')">Цель!</button>
        <button class="qr-btn" onclick="quickSend('Чисто')">Чисто</button>
        <button class="qr-btn" onclick="quickSend('Запрос координат')">Коорд</button>
    </div>

    <div class="chat-input-area">
        <input type="text" id="chat-input" placeholder="ДОКЛАД..." autocomplete="off" onkeydown="if(event.key==='Enter') sendMsg()">
        <button onclick="sendMsg()" style="background:var(--neon); border:none; padding:0 18px; cursor:pointer; font-weight:bold">></button>
    </div>
</div>

<div class="map-wrapper">
    <div id="map-bottom" class="map-layer"></div>
    <div class="map-grid-overlay"></div>
    <div id="map-top" class="map-layer"></div>
</div>

<div class="hud">
    <div>
        <div class="top-header-panel">
            <div class="telemetry-box" id="telemetry">
                Time: <b id="time-val">00:00:00</b><br>
                Date: <b id="date-val">--.--.----</b><br>
                Loc: <b id="loc-name">ТРИАНГУЛЯЦИЯ...</b><br>
                Satel: <b id="sat-val">24 ACTIVE</b><br>
                Stat: <span class="stat-indicator"></span><b class="stat-active">active</b>
            </div>
            <div class="minimap-container"><div id="minimap"></div></div>
        </div>
        <div class="weather-ticker">
            <div class="ticker-content" id="weather-val">
                ПОЛУЧЕНИЕ ДАННЫХ МЕТЕОСЛУЖБЫ... СКАНИРОВАНИЕ ЛОКАЛЬНЫХ СЛОЕВ АТМОСФЕРЫ...
            </div>
        </div>
    </div>
    
    <div class="crosshair" id="main-crosshair">
        <div class="target-data" id="target-info">SCANNING...</div>
    </div>

    <div class="controls">
        <button class="icon-btn" onclick="menuAction('Режим визуализации', toggleVision)" title="Vision Mode"><svg viewBox="0 0 24 24"><path d="M12 2L1 7l11 5 11-5-11-5-11-5zM1 12l11 5 11-5-11-5-11 5zm0 5l11 5 11-5-11-5-11 5z"/></svg></button>
        <button class="icon-btn" id="poi-btn" onclick="menuAction('Маркировка сектора', enablePoiMode)" title="Mark POI"><svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg></button>
        <button class="icon-btn" onclick="menuAction('Фильтр сканера', toggleScannerMask)" title="Filter"><svg viewBox="0 0 24 24"><path d="M12 9c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3zM12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg></button>
        <button class="icon-btn" id="chat-btn" onclick="menuAction('Канал связи', toggleChat)" title="Comms"><svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg></button>
    </div>
</div>

<script>
    const STYLES = {
        vector: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
        satellite: {
            "version": 8, "sources": { "sat": { "type": "raster", "tiles": ["https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}"], "tileSize": 256 }},
            "layers": [{ "id": "sat", "type": "raster", "source": "sat" }]
        }
    };

    const PROTOCOLS = {
        12: "Наблюдение. Исключить визуальный контакт.",
        44: "Активное сканирование. Сбор сигнатур.",
        05: "Полная зачистка. Огонь по готовности.",
        77: "Эвакуация. Покиньте квадрат."
    };

    const config = { center: [30.5234, 50.4501], zoom: 16.5, pitch: 60, bearing: -15, attributionControl: false };
    const mapBottom = new maplibregl.Map({ container: 'map-bottom', style: STYLES.vector, ...config });
    const mapTop = new maplibregl.Map({ container: 'map-top', style: STYLES.vector, ...config, interactionHandlers: false });
    const miniMap = new maplibregl.Map({ container: 'minimap', style: STYLES.satellite, center: config.center, zoom: 14, bearing: config.bearing, interactive: false, attributionControl: false });

    const elContainer = document.createElement('div');
    elContainer.className = 'user-dot-container';
    elContainer.innerHTML = '<div class="user-dir" id="dir-arrow"></div>';
    const dirMarker = new maplibregl.Marker({ element: elContainer }).setLngLat(config.center).addTo(miniMap);

    let isTargetLocked = false;
    let isAddingPoi = false;

    // --- ГЕОЛОКАЦИЯ И ПОГОДА ---
    function updateLocationAndWeather(pos) {
        const { latitude: lat, longitude: lng } = pos.coords;
        const center = [lng, lat];
        
        mapBottom.jumpTo({ center });
        mapTop.jumpTo({ center });
        miniMap.jumpTo({ center });
        dirMarker.setLngLat(center);

        // Симуляция получения данных на основе координат
        const cityKey = (lat.toFixed(0) % 2 === 0) ? "СЕВЕРНЫЙ" : "ЮЖНЫЙ";
        const temp = 10 + Math.floor(Math.random() * 15);
        const wind = 3 + Math.floor(Math.random() * 7);
        const weatherText = `РЕГИОН: ${lat.toFixed(4)}N ${lng.toFixed(4)}E | СТАТУС: ЧИСТО | ТЕМПЕРАТУРА: +${temp}°C | ВЕТЕР: ${wind} М/С | ОСАДКИ: 0% | ВИДИМОСТЬ: ВЫСОКАЯ | АНОМАЛИИ: НЕ ОБНАРУЖЕНЫ`;
        
        document.getElementById('weather-val').innerText = `${weatherText} | ${weatherText}`;
    }

    navigator.geolocation.getCurrentPosition(updateLocationAndWeather, (err) => {
        console.warn("Geo access denied", err);
        // Fallback text if denied
        document.getElementById('weather-val').innerText = "ОШИБКА ДОСТУПА К ГЕОПОЗИЦИИ... ИСПОЛЬЗУЮТСЯ ДЕФОЛТНЫЕ ПАРАМЕТРЫ СЕКТОРА...";
    });

    // --- ОБНОВЛЕНИЕ ВРЕМЕНИ И ДАТЫ ---
    function updateClock() {
        const now = new Date();
        document.getElementById('time-val').innerText = now.toLocaleTimeString('ru-RU', { hour12: false });
        document.getElementById('date-val').innerText = now.toLocaleDateString('ru-RU');
        
        if (Math.random() > 0.95) {
            const count = 20 + Math.floor(Math.random() * 8);
            document.getElementById('sat-val').innerText = `${count} ACTIVE`;
        }
    }
    setInterval(updateClock, 1000);
    updateClock();

    // --- АУДИО И ИИ ---
    function playBeep() {
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const g = ctx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(800, ctx.currentTime);
            g.gain.setValueAtTime(0.04, ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.1);
            osc.connect(g); g.connect(ctx.destination);
            osc.start(); osc.stop(ctx.currentTime + 0.1);
        } catch(e) {}
    }

    function speak(text) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        const voices = window.speechSynthesis.getVoices();
        msg.voice = voices.find(v => v.lang.includes('ru') && v.name.toLowerCase().includes('male')) || voices.find(v => v.lang.includes('ru'));
        msg.pitch = 0.55; 
        msg.rate = 1.15;
        window.speechSynthesis.speak(msg);
    }

    function menuAction(label, fn) {
        playBeep();
        speak(label);
        fn();
    }

    function botResponse(userText) {
        let response = "";
        const text = userText.toLowerCase().trim();
        const c = mapBottom.getCenter();

        playBeep();

        if (/^(привет|хай|здравствуй|салют)/.test(text)) {
            response = `Связь установлена. Центр-9 слушает. Доложите статус в квадрате ${c.lat.toFixed(2)}N.`;
        } 
        else if (text.includes("кто ты") || text.includes("идентификация")) {
            response = "Я тактический модуль управления огнем и навигацией. Мой позывной — Центр. Продолжайте выполнение задачи.";
        }
        else if (text.includes("координат") || text.includes("локац")) {
            response = `Внимание, даю точную привязку: Широта ${c.lat.toFixed(6)}, Долгота ${c.lng.toFixed(6)}. Спутниковая группировка подтверждает позицию.`;
        }
        else if (text.includes("статус")) {
            response = isTargetLocked ? 
                "Объект зафиксирован в перекрестии. Веду расчет баллистических поправок. Не сбивайте захват." : 
                "Аномальной активности в секторе не выявлено. Термальный фон стабилен. Продолжайте патрулирование.";
        } 
        else if (text.includes("цель") || text.includes("вижу")) {
            if (isTargetLocked) response = "Визуальное подтверждение получено. Цель идентифицирована как приоритетная. Группа зачистки в пути.";
            else response = "Отрицательно. Сканнер не подтверждает наличие сигнатуры. Проверьте настройки оптики.";
        } 
        else if (text.includes("чисто")) {
            response = "Рапорт принят. Обновляю тактическую карту. Сектор признан безопасным для прохода.";
        }
        else {
            const pCode = Object.keys(PROTOCOLS)[Math.floor(Math.random() * 4)];
            response = `Принято. Активирована директива ${pCode}: ${PROTOCOLS[pCode]} Жду подтверждения.`;
        }

        setTimeout(() => {
            appendMsg("ЦЕНТР", response, true);
            speak(response);
        }, 400);
    }

    function appendMsg(sender, text, isBot = false) {
        const container = document.getElementById('chat-msgs');
        const msgDiv = document.createElement('div');
        msgDiv.className = `msg ${isBot ? 'bot' : ''}`;
        const t = new Date().toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
        msgDiv.innerHTML = `<b>${sender} [${t}]</b> <span class="txt"></span>`;
        container.appendChild(msgDiv);
        
        const span = msgDiv.querySelector('.txt');
        let i = 0;
        function typing() {
            if (i < text.length) {
                span.innerHTML += text.charAt(i);
                i++;
                container.scrollTop = container.scrollHeight;
                setTimeout(typing, 15);
            }
        }
        typing();
    }

    function sendMsg() {
        const input = document.getElementById('chat-input');
        if (!input.value.trim()) return;
        appendMsg("ВЫ", input.value);
        botResponse(input.value);
        input.value = '';
    }

    function quickSend(text) {
        appendMsg("ВЫ", text);
        botResponse(text);
    }

    // --- КАРТА И ЛОГИКА ---
    function updateSelection() {
        const features = mapTop.queryRenderedFeatures([window.innerWidth/2, window.innerHeight/2], { layers: ['top-3d'] });
        const info = document.getElementById('target-info');
        
        if (features.length > 0) {
            mapTop.setFilter('building-highlight', ['==', ['id'], features[0].id]);
            info.innerHTML = `TARGET LOCKED`;
            info.className = 'target-data locked';
            isTargetLocked = true;
        } else {
            mapTop.setFilter('building-highlight', ['==', ['id'], '']);
            info.innerHTML = `SCANNING...`;
            info.className = 'target-data searching-anim';
            isTargetLocked = false;
        }
    }

    mapBottom.on('move', () => {
        const c = mapBottom.getCenter();
        const b = mapBottom.getBearing();
        const z = mapBottom.getZoom();
        miniMap.jumpTo({ center: c, bearing: b, zoom: Math.max(z - 2.5, 12) });
        mapTop.jumpTo({ center: c, zoom: z, pitch: mapBottom.getPitch(), bearing: b });
        dirMarker.setLngLat(c);
        document.getElementById('loc-name').innerText = `${c.lat.toFixed(4)}N ${c.lng.toFixed(4)}E`;
        updateSelection();
    });

    function initBuildings(map, id, isTop) {
        map.on('style.load', () => {
            const src = 'carto';
            if (!map.getSource(src)) map.addSource(src, { type: 'vector', url: 'https://tiles.basemaps.cartocdn.com/vector/carto.streets.v1/tiles.json' });
            map.addLayer({
                'id': id, 'source': src, 'source-layer': 'building', 'type': 'fill-extrusion',
                'paint': { 'fill-extrusion-color': isTop ? '#444' : '#0a0a0a', 'fill-extrusion-height': ['get', 'render_height'], 'fill-extrusion-opacity': isTop ? 0.9 : 0.6 }
            });
            if (isTop) {
                map.addLayer({
                    'id': 'building-highlight', 'source': src, 'source-layer': 'building', 'type': 'fill-extrusion',
                    'paint': { 'fill-extrusion-color': '#32ff7e', 'fill-extrusion-height': ['get', 'render_height'], 'fill-extrusion-opacity': 0.8 },
                    'filter': ['==', ['id'], '']
                });
            }
        });
    }

    initBuildings(mapBottom, 'bot-3d', false);
    initBuildings(mapTop, 'top-3d', true);

    function toggleChat() {
        document.getElementById('chat-panel').classList.toggle('open');
        document.getElementById('chat-btn').classList.toggle('active');
    }

    function enablePoiMode() {
        isAddingPoi = !isAddingPoi;
        document.getElementById('poi-btn').classList.toggle('active', isAddingPoi);
    }

    mapBottom.on('click', (e) => {
        if (!isAddingPoi) return;
        const coords = e.lngLat;
        new maplibregl.Popup({ closeButton: false, anchor: 'bottom' }).setLngLat(coords).setHTML(`
            <div class="marker-form">
                <input type="text" id="poi-title" placeholder="НАЗВАНИЕ ОБЪЕКТА...">
                <textarea id="poi-desc" placeholder="КОММЕНТАРИЙ К ЦЕЛИ..."></textarea>
                <button onclick="savePoi(${coords.lng}, ${coords.lat})">МАРКИРОВАТЬ</button>
            </div>
        `).addTo(mapBottom);
        enablePoiMode();
    });

    function savePoi(lng, lat) {
        const title = document.getElementById('poi-title').value || "ОБЪЕКТ";
        const desc = document.getElementById('poi-desc').value || "Без описания";
        
        const el = document.createElement('div'); 
        el.className = 'custom-poi';
        
        const marker = new maplibregl.Marker({ element: el })
            .setLngLat([lng, lat])
            .addTo(mapBottom);

        el.addEventListener('click', (e) => {
            e.stopPropagation();
            playBeep();
            
            const infoHtml = `
                <div class="poi-info-panel">
                    <b>${title}</b>
                    ${desc}<br>
                    <span style="font-size:8px; opacity:0.6; margin-top:5px; display:block;">
                        LAT: ${lat.toFixed(5)} / LNG: ${lng.toFixed(5)}
                    </span>
                </div>
            `;
            
            new maplibregl.Popup({ closeButton: false, anchor: 'bottom', offset: [0, -10] })
                .setLngLat([lng, lat])
                .setHTML(infoHtml)
                .addTo(mapBottom);

            speak(`Объект ${title}. ${desc}. Координаты: широта ${lat.toFixed(2)}, долгота ${lng.toFixed(2)}.`);
        });
        
        appendMsg("ВЫ", `Установлен маркер: ${title}. ${desc}`);
        botResponse(`Данные по объекту ${title} занесены в тактический реестр. Сектор обновлен.`);
        
        const popup = document.querySelector('.maplibregl-popup');
        if (popup) popup.remove();
    }

    function toggleVision() {
        const overlay = document.getElementById('transition-overlay');
        overlay.classList.remove('glitch-flash');
        void overlay.offsetWidth; // Trigger reflow
        overlay.classList.add('glitch-flash');

        const isSat = mapBottom.getStyle().layers.some(l => l.id === 'sat');
        mapBottom.setStyle(isSat ? STYLES.vector : STYLES.satellite);
    }

    function toggleScannerMask() {
        const s = document.getElementById('map-top').style;
        const c = document.getElementById('main-crosshair').style;
        const state = s.opacity === "0" ? "1" : "0";
        s.opacity = state;
        c.opacity = state;
    }

    window.speechSynthesis.getVoices();
</script>
</body>
</html>
