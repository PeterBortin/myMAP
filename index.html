<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>NEURAL INTERFACE v14.0 - SCANNER</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        :root { --neon: #32ff7e; --glass: rgba(0, 0, 0, 0.6); }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Courier New', monospace; color: var(--neon); }
        
        .map-wrapper { position: absolute; inset: 0; transition: filter 0.4s; }
        .map-layer { position: absolute; inset: 0; }
        #map-top {
            z-index: 2;
            -webkit-mask-image: radial-gradient(circle, black 100px, transparent 180px);
            mask-image: radial-gradient(circle, black 100px, transparent 180px);
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        #map-bottom { z-index: 1; filter: brightness(0.25) grayscale(1); }

        .hud { position: absolute; inset: 0; z-index: 200; pointer-events: none; padding: 20px; display: flex; flex-direction: column; justify-content: space-between; }
        
        .top-panels { display: flex; justify-content: space-between; align-items: flex-start; pointer-events: none; }

        /* Убрана подложка (background) */
        .telemetry-box {
            padding: 10px;
            font-size: 10px;
            line-height: 1.4;
            border-left: 2px solid var(--neon);
            text-transform: uppercase;
            min-width: 220px;
            text-shadow: 2px 2px 4px #000; /* Добавлено для читаемости без фона */
        }
        .telemetry-box b { color: #fff; }

        /* Мини-карта шире (260px) */
        .minimap-container {
            width: 260px;
            height: 120px;
            background: #000;
            position: relative;
            overflow: hidden;
            border-bottom: 1px solid rgba(50, 255, 126, 0.3);
            pointer-events: none;
        }
        #minimap { width: 100%; height: 100%; filter: saturate(0.6) brightness(0.7); }
        
        .user-dot {
            width: 8px; height: 8px;
            background: var(--neon);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--neon);
            position: relative;
        }
        .user-dot::after {
            content: ''; position: absolute; top: -10px; left: 3px;
            width: 2px; height: 10px; background: var(--neon);
            box-shadow: 0 0 5px var(--neon);
        }

        .crosshair { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            width: 300px; height: 300px; border: 1px solid rgba(50, 255, 126, 0.05); border-radius: 50%; 
        }
        .target-data {
            position: absolute; top: calc(50% + 20px); left: calc(50% + 20px);
            font-size: 9px; letter-spacing: 1px; text-shadow: 0 0 5px #000;
        }

        .controls { display: flex; flex-direction: column; align-items: center; gap: 10px; padding-bottom: 40px; pointer-events: auto; }
        .btn { 
            background: rgba(0, 0, 0, 0.6); border: 1px solid rgba(50, 255, 126, 0.3); 
            color: var(--neon); padding: 10px 30px; cursor: pointer; 
            text-transform: uppercase; letter-spacing: 3px; font-size: 11px;
            width: 280px;
        }
        .btn:hover { background: rgba(50, 255, 126, 0.1); }
        
        .overlay-fx { position: absolute; inset: 0; pointer-events: none; z-index: 150; background: repeating-linear-gradient(0deg, rgba(255, 255, 255, 0.005) 0px, transparent 1px); background-size: 100% 4px; }
    </style>
</head>
<body>

<div class="overlay-fx"></div>
<div class="map-wrapper" id="master-wrapper">
    <div id="map-bottom" class="map-layer"></div>
    <div id="map-top" class="map-layer"></div>
</div>

<div class="hud">
    <div class="top-panels">
        <div class="telemetry-box" id="telemetry">
            ENV: <b>ACTIVE_SCAN</b><br>
            LOC: <b id="loc-name">CALCULATING...</b><br>
            WTHR: <b>CLEAR / 18.1°C</b><br>
            AIR: <b>AQI 42 (GOOD)</b><br>
            CO2: <b>415.2 PPM</b>
        </div>

        <div class="minimap-container">
            <div id="minimap"></div>
        </div>
    </div>
    
    <div class="crosshair" id="main-crosshair">
        <div class="target-data" id="target-info"></div>
    </div>

    <div class="controls">
        <button class="btn" onclick="toggleVision()">Viewport Mode</button>
        <button class="btn" onclick="toggleScannerMask()">Scanner Circle: ON/OFF</button>
    </div>
</div>

<script>
    const STYLES = {
        vector: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
        satellite: {
            "version": 8, "sources": { "sat": { "type": "raster", "tiles": ["https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}"], "tileSize": 256 }},
            "layers": [{ "id": "sat", "type": "raster", "source": "sat" }]
        }
    };

    const config = { center: [30.5234, 50.4501], zoom: 16.5, pitch: 60, bearing: -15, attributionControl: false };
    
    const mapBottom = new maplibregl.Map({ container: 'map-bottom', style: STYLES.vector, ...config });
    const mapTop = new maplibregl.Map({ container: 'map-top', style: STYLES.vector, ...config, interactionHandlers: false });
    const miniMap = new maplibregl.Map({ 
        container: 'minimap', 
        style: STYLES.satellite, 
        center: config.center, 
        zoom: 14, 
        interactive: false, 
        attributionControl: false 
    });

    const el = document.createElement('div');
    el.className = 'user-dot';
    const marker = new maplibregl.Marker({ element: el }).setLngLat(config.center).addTo(miniMap);

    // Добавляем слой для выделения на мини-карту
    miniMap.on('load', () => {
        miniMap.addSource('mini-carto', { type: 'vector', url: 'https://tiles.basemaps.cartocdn.com/vector/carto.streets.v1/tiles.json' });
        miniMap.addLayer({
            'id': 'mini-building-highlight', 'source': 'mini-carto', 'source-layer': 'building', 'type': 'fill',
            'paint': { 'fill-color': '#ffffff', 'fill-opacity': 0.8 },
            'filter': ['==', ['id'], '']
        });
    });

    mapBottom.on('move', () => {
        const center = mapBottom.getCenter();
        const zoom = mapBottom.getZoom();
        const bearing = mapBottom.getBearing();
        const pitch = mapBottom.getPitch();

        miniMap.jumpTo({ center, bearing, zoom: Math.max(zoom - 2.5, 12) });
        mapTop.jumpTo({ center, zoom, pitch, bearing });
        marker.setLngLat(center);
        
        document.getElementById('loc-name').innerText = `${center.lat.toFixed(4)}N ${center.lng.toFixed(4)}E`;
        updateSelection();
    });

    let hoveredBuildingId = null;
    function updateSelection() {
        const centerPoint = [window.innerWidth / 2, window.innerHeight / 2];
        const features = mapTop.queryRenderedFeatures(centerPoint, { layers: ['top-3d'] });
        const infoBox = document.getElementById('target-info');

        if (features.length > 0) {
            const id = features[0].id;
            if (id !== hoveredBuildingId) {
                hoveredBuildingId = id;
                mapTop.setFilter('building-highlight', ['==', ['id'], id]);
                // Дублируем выделение на мини-карте белым цветом
                if (miniMap.getLayer('mini-building-highlight')) {
                    miniMap.setFilter('mini-building-highlight', ['==', ['id'], id]);
                }
                infoBox.innerHTML = `TARGET_LOCKED<br>ID: ${id.toString().slice(0,8)}`;
            }
        } else {
            if (hoveredBuildingId !== null) {
                hoveredBuildingId = null;
                mapTop.setFilter('building-highlight', ['==', ['id'], '']);
                if (miniMap.getLayer('mini-building-highlight')) {
                    miniMap.setFilter('mini-building-highlight', ['==', ['id'], '']);
                }
                infoBox.innerHTML = '';
            }
        }
    }

    function initBuildings(map, id, isTop) {
        map.on('style.load', () => {
            const src = 'carto';
            // Если стиля нет, добавляем источник вручную для надежности
            if (!map.getSource(src)) {
                map.addSource(src, { type: 'vector', url: 'https://tiles.basemaps.cartocdn.com/vector/carto.streets.v1/tiles.json' });
            }
            map.addLayer({
                'id': id, 'source': src, 'source-layer': 'building', 'type': 'fill-extrusion',
                'paint': {
                    'fill-extrusion-color': isTop ? '#333' : '#050505',
                    'fill-extrusion-height': ['get', 'render_height'],
                    'fill-extrusion-base': ['get', 'render_min_height'],
                    'fill-extrusion-opacity': isTop ? 0.8 : 0.5
                }
            });
            if (isTop) {
                map.addLayer({
                    'id': 'building-highlight', 'source': src, 'source-layer': 'building', 'type': 'fill-extrusion',
                    'paint': { 'fill-extrusion-color': '#32ff7e', 'fill-extrusion-height': ['get', 'render_height'], 'fill-extrusion-opacity': 0.8 },
                    'filter': ['==', ['id'], '']
                });
            }
        });
    }

    initBuildings(mapBottom, 'bot-3d', false);
    initBuildings(mapTop, 'top-3d', true);

    function toggleVision() {
        const isSat = mapBottom.getStyle().layers.some(l => l.id === 'sat');
        mapBottom.setStyle(isSat ? STYLES.vector : STYLES.satellite);
    }

    // Логика отключения/включения круга
    let scannerVisible = true;
    function toggleScannerMask() {
        scannerVisible = !scannerVisible;
        const topMapEl = document.getElementById('map-top');
        const crosshairEl = document.getElementById('main-crosshair');
        
        if (scannerVisible) {
            topMapEl.style.opacity = "1";
            crosshairEl.style.opacity = "1";
        } else {
            topMapEl.style.opacity = "0";
            crosshairEl.style.opacity = "0";
        }
    }

    navigator.geolocation.getCurrentPosition(pos => {
        const userLoc = [pos.coords.longitude, pos.coords.latitude];
        mapBottom.flyTo({ center: userLoc, zoom: 17 });
    });
</script>
</body>
</html>
