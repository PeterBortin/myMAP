<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>NEURAL INTERFACE v14.0</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        :root { --neon: #32ff7e; --glass: rgba(0, 0, 0, 0.4); }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Courier New', monospace; color: var(--neon); }
        
        .map-wrapper { position: absolute; inset: 0; transition: filter 0.4s; }
        .map-layer { position: absolute; inset: 0; }

        /* Увеличенный блюр граней (растянутый градиент маски) */
        #map-top {
            z-index: 2;
            -webkit-mask-image: radial-gradient(circle, black 100px, transparent 180px);
            mask-image: radial-gradient(circle, black 100px, transparent 180px);
            pointer-events: none;
        }
        #map-bottom { z-index: 1; filter: brightness(0.25) grayscale(1); }

        .hud { position: absolute; inset: 0; z-index: 200; pointer-events: none; padding: 20px; display: flex; flex-direction: column; justify-content: space-between; }
        
        .header-grid { 
            display: grid; grid-template-columns: 1fr 1fr 1fr; 
            font-size: 10px; text-transform: uppercase; gap: 20px; 
            background: var(--glass); padding: 10px; 
            border-bottom: 1px solid rgba(50, 255, 126, 0.05); 
            opacity: 0.45;
        }
        .col b { color: #fff; }

        /* Чистый прицел без яркой окантовки */
        .crosshair { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            width: 360px; height: 360px; 
            border: 1px solid rgba(50, 255, 126, 0.05); /* Почти невидимый контур */
            border-radius: 50%; 
        }
        .crosshair::after {
            content: ''; position: absolute; top: 50%; left: 50%;
            width: 2px; height: 2px; background: var(--neon);
            transform: translate(-50%, -50%); border-radius: 50%;
            box-shadow: 0 0 4px var(--neon);
        }

        .controls { display: flex; justify-content: center; padding-bottom: 40px; pointer-events: auto; }
        
        .btn { 
            background: rgba(0, 0, 0, 0.6); 
            border: 1px solid rgba(50, 255, 126, 0.3); 
            color: var(--neon); 
            padding: 10px 30px; 
            cursor: pointer; 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            font-size: 11px;
            transition: 0.4s cubic-bezier(0.2, 1, 0.3, 1); 
        }
        .btn:hover { border-color: var(--neon); background: rgba(50, 255, 126, 0.1); text-shadow: 0 0 8px var(--neon); }
        .btn:active { transform: scale(0.97); opacity: 0.7; }

        .overlay-fx { position: absolute; inset: 0; pointer-events: none; z-index: 150; background: repeating-linear-gradient(0deg, rgba(255, 255, 255, 0.005) 0px, transparent 1px); background-size: 100% 4px; }
    </style>
</head>
<body>

<div class="overlay-fx"></div>
<div class="map-wrapper" id="master-wrapper">
    <div id="map-bottom" class="map-layer"></div>
    <div id="map-top" class="map-layer"></div>
</div>

<div class="hud">
    <div class="header-grid">
        <div class="col">
            <span>STATION: <b>ORBITAL_V9</b></span>
            <span>LINK: <b id="signal">--%</b></span>
        </div>
        <div class="col" style="text-align: center;">
            <b id="coords">CONNECTING...</b>
        </div>
        <div class="col" style="text-align: right;">
            <span>ENV: <b>STABLE</b></span>
            <span>TEMP: <b>18.1°C</b></span>
        </div>
    </div>
    
    <div class="crosshair"></div>

    <div class="controls">
        <button class="btn" onclick="toggleVision()">Viewport</button>
    </div>
</div>

<script>
    const STYLES = {
        vector: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
        satellite: {
            "version": 8, "sources": { "sat": { "type": "raster", "tiles": ["https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}"], "tileSize": 256 }},
            "layers": [{ "id": "sat", "type": "raster", "source": "sat" }]
        }
    };

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSoftSound(freq, duration, vol) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(vol, audioCtx.currentTime + 0.05); 
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    }

    const config = { center: [30.5234, 50.4501], zoom: 16, pitch: 60, bearing: -15, attributionControl: false };
    const mapBottom = new maplibregl.Map({ container: 'map-bottom', style: STYLES.vector, ...config });
    const mapTop = new maplibregl.Map({ container: 'map-top', style: STYLES.vector, ...config, interactionHandlers: false });

    navigator.geolocation.getCurrentPosition(pos => {
        const userLoc = [pos.coords.longitude, pos.coords.latitude];
        mapBottom.flyTo({ center: userLoc, zoom: 17, duration: 3000 });
        playSoftSound(220, 0.8, 0.03);
    });

    mapBottom.on('move', () => {
        mapTop.jumpTo({ center: mapBottom.getCenter(), zoom: mapBottom.getZoom(), pitch: mapBottom.getPitch(), bearing: mapBottom.getBearing() });
        const c = mapBottom.getCenter();
        document.getElementById('coords').innerText = `${c.lat.toFixed(4)}N ${c.lng.toFixed(4)}E`;
    });

    function initBuildings(map, id, isTop) {
        map.on('style.load', () => {
            const source = map.getSource('carto') ? 'carto' : 'openmaptiles';
            if (!map.getSource(source)) return;
            map.addLayer({
                'id': id, 'source': source, 'source-layer': 'building', 'type': 'fill-extrusion',
                'paint': {
                    'fill-extrusion-color': isTop ? '#444' : '#0a0a0a',
                    'fill-extrusion-height': ['get', 'render_height'],
                    'fill-extrusion-opacity': isTop ? 0.7 : 0.3,
                    'fill-extrusion-vertical-gradient': true
                }
            });
        });
    }

    initBuildings(mapBottom, 'bot-3d', false);
    initBuildings(mapTop, 'top-3d', true);

    let isSatellite = false;
    function toggleVision() {
        playSoftSound(400, 0.3, 0.02);
        isSatellite = !isSatellite;
        const wrapper = document.getElementById('master-wrapper');
        wrapper.style.filter = "brightness(1.5) blur(12px)";
        setTimeout(() => {
            mapBottom.setStyle(isSatellite ? STYLES.satellite : STYLES.vector);
            wrapper.style.filter = "";
        }, 250);
    }

    setInterval(() => {
        document.getElementById('signal').innerText = (98 + Math.random() * 1.9).toFixed(1) + '%';
    }, 4000);
</script>
</body>
</html>
